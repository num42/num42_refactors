name: Credo

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: credo-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  credo:
    name: Credo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Elixir
        uses: ./.github/actions/setup-elixir
        with:
          mix-env: dev

      - name: Credo (high priority only)
        env:
          MIX_ENV: dev
        run: mix credo --min-priority=high
