name: Credo

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: credo-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  credo:
    name: Credo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Elixir
        uses: ./.github/actions/setup-elixir
        with:
          mix-env: dev

      - name: Credo (high priority only)
        env:
          MIX_ENV: dev
        run: mix credo --min-priority=high
