name: Dialyzer

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: dialyzer-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Elixir with PLT cache
        uses: ./.github/actions/setup-elixir
        with:
          mix-env: dev
          cache-plt: "true"

      - name: Compile (dev)
        env:
          MIX_ENV: dev
        run: mix compile

      - name: Run Dialyzer
        env:
          MIX_ENV: dev
        run: mix dialyzer --format short
